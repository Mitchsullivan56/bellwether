name: CI

# Runs the smoke tests on every push / PR, so a broken change is caught
# before Streamlit Cloud redeploys it to the live app.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run smoke tests
        run: pytest -q test_app.py
